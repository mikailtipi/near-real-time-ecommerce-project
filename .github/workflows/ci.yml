name: Pipeline CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  dbt-test:
    name: dbt tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: pipeline
          POSTGRES_PASSWORD: pipeline
          POSTGRES_DB: ecommerce
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install dbt-postgres psycopg2-binary faker

      - name: Init database schema
        env:
          PGPASSWORD: pipeline
        run: |
          psql -h localhost -U pipeline -d ecommerce -c "CREATE SCHEMA IF NOT EXISTS raw;"
          psql -h localhost -U pipeline -d ecommerce -c "CREATE SCHEMA IF NOT EXISTS staging;"
          psql -h localhost -U pipeline -d ecommerce -c "CREATE SCHEMA IF NOT EXISTS marts;"
          psql -h localhost -U pipeline -d ecommerce -c "
            CREATE TABLE IF NOT EXISTS raw.orders (
              order_id VARCHAR(50) PRIMARY KEY,
              customer_id VARCHAR(50),
              order_status VARCHAR(30),
              order_purchase_ts TIMESTAMP,
              order_approved_ts TIMESTAMP,
              order_delivered_ts TIMESTAMP,
              order_estimated_delivery_date DATE,
              weather_condition VARCHAR(50),
              weather_desc VARCHAR(100),
              temperature_c NUMERIC,
              humidity INT,
              wind_speed NUMERIC,
              created_at TIMESTAMP DEFAULT NOW()
            );
            CREATE TABLE IF NOT EXISTS raw.customers (
              customer_id VARCHAR(50) PRIMARY KEY,
              customer_city VARCHAR(100),
              customer_state VARCHAR(50),
              customer_zip VARCHAR(20),
              country_code VARCHAR(5),
              country_name VARCHAR(100),
              currency VARCHAR(10),
              population BIGINT,
              region VARCHAR(100),
              lat NUMERIC,
              lon NUMERIC,
              created_at TIMESTAMP DEFAULT NOW()
            );
            CREATE TABLE IF NOT EXISTS raw.products (
              product_id VARCHAR(50) PRIMARY KEY,
              category_name VARCHAR(100),
              product_weight_g NUMERIC,
              product_price NUMERIC,
              created_at TIMESTAMP DEFAULT NOW()
            );
            CREATE TABLE IF NOT EXISTS raw.order_items (
              order_id VARCHAR(50),
              product_id VARCHAR(50),
              seller_id VARCHAR(50),
              quantity INT,
              price NUMERIC,
              freight_value NUMERIC,
              created_at TIMESTAMP DEFAULT NOW()
            );
            CREATE TABLE IF NOT EXISTS raw.dq_results (
              run_id SERIAL PRIMARY KEY,
              table_name VARCHAR(100),
              check_name VARCHAR(100),
              status VARCHAR(10),
              detail TEXT,
              row_count INT,
              fail_count INT,
              run_at TIMESTAMP DEFAULT NOW()
            );
            GRANT ALL ON SCHEMA raw TO pipeline;
            GRANT ALL ON SCHEMA staging TO pipeline;
            GRANT ALL ON SCHEMA marts TO pipeline;
            GRANT ALL ON ALL TABLES IN SCHEMA raw TO pipeline;
            GRANT ALL ON ALL SEQUENCES IN SCHEMA raw TO pipeline;
          "

      - name: Seed data
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: pipeline
          DB_PASSWORD: pipeline
          DB_NAME: ecommerce
        run: python ingestion/generate_orders.py --mode seed

      - name: Run DQ checks
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: pipeline
          DB_PASSWORD: pipeline
          DB_NAME: ecommerce
        run: python data_quality/dq_check.py --no-save

      - name: dbt run
        working-directory: dbt_project
        run: dbt run --profiles-dir . --target ci

      - name: dbt test
        working-directory: dbt_project
        run: dbt test --profiles-dir . --target ci
