version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: orders
        columns:
          - name: order_id
            tests: [not_null, unique]
          - name: customer_id
            tests: [not_null]
          - name: order_status
            tests:
              - not_null
              - accepted_values:
                  values: ["delivered","shipped","processing","cancelled","returned"]
      - name: customers
        columns:
          - name: customer_id
            tests: [not_null, unique]
      - name: products
        columns:
          - name: product_id
            tests: [not_null, unique]
          - name: product_price
            tests: [not_null]
      - name: order_items
        columns:
          - name: order_id
            tests: [not_null]
          - name: product_id
            tests: [not_null]

models:
  - name: stg_orders
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]

  - name: mart_order_metrics
    columns:
      - name: order_date
        tests: [not_null, unique]
      - name: gross_revenue
        tests: [not_null]
